services:
  ollama:
    image: ollama/ollama:${OLLAMA_VERSION}
    container_name: ${CONTAINER_NAME}
    ports:
      - "${OLLAMA_PORT}:11434"
    environment:
      - OLLAMA_ORIGINS=${OLLAMA_ORIGINS}
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

volumes:
  ollama_data: