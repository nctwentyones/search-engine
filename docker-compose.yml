services:
  # --- OLLAMA (Otak AI) ---
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  # --- BACKEND (Python FastAPI) ---
  backend:
    build: ./backend
    container_name: company_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/uploads:/app/uploads
    environment:
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      - ollama

  # --- FRONTEND (Next.js UI) ---
  frontend:
    build: ./frontend
    container_name: company_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend

# INI BAGIAN YANG TADI KURANG (PENTING!)
volumes:
  ollama_data: